name: CD — Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all

  build-mac:
    name: Build macOS (arm64)
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release

      - name: Package
        run: |
          mkdir -p dist
          cp target/release/clippy dist/clippy-macos-arm64
          cd dist && tar czf clippy-macos-arm64.tar.gz clippy-macos-arm64

      - uses: actions/upload-artifact@v4
        with:
          name: clippy-macos-arm64
          path: dist/clippy-macos-arm64.tar.gz

  build-windows:
    name: Build Windows (x86_64)
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release

      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          cp target/release/clippy.exe dist/clippy-windows-x86_64.exe

      - uses: actions/upload-artifact@v4
        with:
          name: clippy-windows-x86_64
          path: dist/clippy-windows-x86_64.exe

  release:
    name: Create GitHub Release
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/clippy-macos-arm64/clippy-macos-arm64.tar.gz
            artifacts/clippy-windows-x86_64/clippy-windows-x86_64.exe
